<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоальбом - Мои альбомы</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="container header-container">
        <div class="logo">
            <span class="logo-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\terka.svg</svg></span>
            Фотоальбом
        </div>
        <nav class="header-nav">
            <a href="/index.html" class="nav-link">
                <span class="nav-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\home.svg</svg></span>
                Лента
            </a>
            <a href="/albums.html" class="nav-link active">
                <span class="nav-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\album1.svg</svg></span>
                Мои альбомы
            </a>
            <a href="/profile.html" class="nav-link">
                <span class="nav-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\profile.svg</svg></span>
                Профиль
            </a>
        </nav>
        <div class="profile-menu">
            <div class="profile-icon" id="userMenu">
                <span class="avatar-placeholder"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\avatar.svg</svg></span>
                <span id="currentUserName">▼</span>
            </div>
            <div class="profile-dropdown" id="profileDropdown" style="display:none;">
                <a href="/profile.html">
                    <span class="dropdown-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\profile.svg</svg></span>
                    Профиль
                </a>
                <a href="#" id="logoutBtn">
                    <span class="dropdown-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\exit.svg</svg></span>
                    Выйти
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container" style="margin-top: 30px; min-height: 500px;">
    <div class="albums-header">
        <h2>Мои фотоальбомы</h2>
        <button class="btn-primary" id="createAlbumBtn">
            <span class="btn-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\plus.svg</svg></span>
            Создать альбом
        </button>
    </div>

    <div class="album-grid" id="albumGrid">
        <p>Загрузка альбомов...</p>
    </div>
</main>

<div class="modal" id="albumModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Название альбома</h2>
            <button class="modal-close" data-close>
                <span><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\krest.svg</svg></span>
            </button>
        </div>
        <div class="modal-body">
            <p id="modalDescription" class="modal-description"></p>
            <div class="modal-meta">
                    <span>
                        <span class="meta-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\locks.svg</svg></span>
                        Приватность: <strong id="modalPrivacy"></strong>
                    </span>
                <span>
                        <span class="meta-icon"><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\cam.svg</svg></span>
                        Фотографий: <strong id="modalPhotoCount">0</strong>
                    </span>
            </div>
            <div class="modal-photo-grid" id="modalPhotos"></div>
        </div>
    </div>
</div>

<div class="modal" id="createAlbumModal">
    <div class="modal-content modal-sm">
        <div class="modal-header">
            <h2>Создать альбом</h2>
            <button class="modal-close" data-close>
                <span><svg>C:\Users\golov\IdeaProjects\rgr\src\main\resources\icons\krest.svg</svg></span>
            </button>
        </div>
        <form id="createAlbumForm" class="modal-body">
            <div class="form-group">
                <label for="albumTitle">Название</label>
                <input type="text" name="title" id="albumTitle" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="albumDescription">Описание</label>
                <textarea name="description" id="albumDescription" class="form-input" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="albumPrivacy">Приватность</label>
                <select name="privacy" id="albumPrivacy" class="form-input">
                    <option value="PRIVATE">Приватный</option>
                    <option value="FRIENDS">Для друзей</option>
                    <option value="PUBLIC">Публичный</option>
                </select>
            </div>
            <button type="submit" class="btn-primary btn-full">Создать</button>
        </form>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>© 2026 Фотоальбом</p>
    </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/albums.js"></script>
</body>
</html>
