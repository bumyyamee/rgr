<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоальбом - Мои альбомы</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">Фотоальбом</div>
            <nav class="header-nav">
                <a href="/index.html" class="nav-link">Лента</a>
                <a href="/albums.html" class="nav-link active">Мои альбомы</a>
                <a href="/profile.html" class="nav-link">Профиль</a>
            </nav>
            <div class="profile-menu">
                <div class="profile-icon">
                    <img src="https://via.placeholder.com/40" alt="Аватар">
                    <span id="currentUserName">Пользователь ▼</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 30px; min-height: 500px;">
        <div class="albums-header">
            <h2>Мои фотоальбомы</h2>
            <button class="btn-primary" id="createAlbumBtn">+ Создать альбом</button>
        </div>
        
        <div class="album-grid" id="albumGrid">
            <p>Загрузка альбомов...</p>
        </div>
    </main>

    <!-- Модальное окно просмотра альбома -->
    <div class="modal" id="albumModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Название альбома</h2>
                <button class="modal-close" data-close>&times;</button>
            </div>
            <div class="modal-body">
                <p id="modalDescription" style="color:#666;"></p>
                <div class="modal-meta">
                    <span>Приватность: <strong id="modalPrivacy"></strong></span>
                    <span>Фотографий: <strong id="modalPhotoCount">0</strong></span>
                </div>
                <div class="modal-photo-grid" id="modalPhotos"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания альбома -->
    <div class="modal" id="createAlbumModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2>Создать альбом</h2>
                <button class="modal-close" data-close>&times;</button>
            </div>
            <form id="createAlbumForm" class="modal-body">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" class="form-input" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Приватность</label>
                    <select name="privacy" class="form-input">
                        <option value="PRIVATE">Приватный</option>
                        <option value="FRIENDS">Для друзей</option>
                        <option value="PUBLIC">Публичный</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Создать</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Фотоальбом</p>
        </div>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/albums.js"></script>
</body>
</html>
