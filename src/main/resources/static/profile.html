<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоальбом - Профиль</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="container header-container">
        <div class="logo">
            <span class="logo-icon"><!-- SVG logo --></span>
            Фотоальбом
        </div>
        <nav class="header-nav">
            <a href="/index.html" class="nav-link">
                <span class="nav-icon"><!-- SVG home --></span>
                Лента
            </a>
            <a href="/albums.html" class="nav-link">
                <span class="nav-icon"><!-- SVG albums --></span>
                Мои альбомы
            </a>
            <a href="/profile.html" class="nav-link active">
                <span class="nav-icon"><!-- SVG profile --></span>
                Профиль
            </a>
        </nav>
        <div class="profile-menu">
            <div class="profile-icon" id="userMenu">
                <span class="avatar-placeholder"><!-- SVG avatar --></span>
                <span id="currentUserName">▼</span>
            </div>
            <div class="profile-dropdown" id="profileDropdown" style="display:none;">
                <a href="/profile.html">
                    <span class="dropdown-icon"><!-- SVG profile --></span>
                    Профиль
                </a>
                <a href="#" id="logoutBtn">
                    <span class="dropdown-icon"><!-- SVG logout --></span>
                    Выйти
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container" style="margin-top: 30px; min-height: 500px;">
    <div class="profile-header-block">
        <div class="profile-avatar-large">
            <span class="avatar-placeholder-large"><!-- SVG avatar large --></span>
        </div>
        <div class="profile-info">
            <h2 id="profileUsername">Иван Петров</h2>
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-icon"><!-- SVG photo --></span>
                    <div class="stat-number" id="statPhotos">156</div>
                    <span>фото</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon"><!-- SVG albums --></span>
                    <div class="stat-number" id="statAlbums">24</div>
                    <span>альбома</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon"><!-- SVG friends --></span>
                    <div class="stat-number" id="statFriends">187</div>
                    <span>друзей</span>
                </div>
            </div>
            <button class="btn-primary" id="editProfileBtn">
                <span class="btn-icon"><!-- SVG edit --></span>
                Редактировать профиль
            </button>
        </div>
    </div>

    <div class="profile-tabs">
        <button class="tab-btn active" data-tab="photos">
            <span class="tab-icon"><!-- SVG photo --></span>
            Мои фотографии
        </button>
        <button class="tab-btn" data-tab="albums">
            <span class="tab-icon"><!-- SVG albums --></span>
            Альбомы
        </button>
        <button class="tab-btn" data-tab="activity">
            <span class="tab-icon"><!-- SVG activity --></span>
            Активность
        </button>
        <button class="tab-btn" data-tab="friends">
            <span class="tab-icon"><!-- SVG friends --></span>
            Друзья
        </button>
    </div>

    <div class="user-photos-grid" id="profilePhotosGrid">
        <p>Загрузка фотографий...</p>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Фотоальбом</p>
    </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
