<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоальбом - Главная</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="container header-container">
        <div class="logo">
            <span class="logo-icon"><!-- SVG logo --></span>
            Фотоальбом
        </div>
        <nav class="header-nav">
            <a href="/index.html" class="nav-link active">
                <span class="nav-icon"><!-- SVG home --></span>
                Лента
            </a>
            <a href="/albums.html" class="nav-link">
                <span class="nav-icon"><!-- SVG albums --></span>
                Мои альбомы
            </a>
            <a href="/profile.html" class="nav-link">
                <span class="nav-icon"><!-- SVG profile --></span>
                Профиль
            </a>
        </nav>
        <div class="search-container">
            <form class="search-form" id="searchForm">
                <span class="search-icon"><!-- SVG search --></span>
                <input type="text" id="searchInput" placeholder="Поиск по тегам или пользователю...">
                <button type="submit">Найти</button>
            </form>
        </div>
        <div class="profile-menu">
            <div class="profile-icon" id="userMenu">
                <span class="avatar-placeholder"><!-- SVG avatar --></span>
                <span id="currentUserName">▼</span>
            </div>
            <div class="profile-dropdown" id="profileDropdown" style="display:none;">
                <a href="/profile.html">
                    <span class="dropdown-icon"><!-- SVG profile --></span>
                    Профиль
                </a>
                <a href="#" id="logoutBtn">
                    <span class="dropdown-icon"><!-- SVG logout --></span>
                    Выйти
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container main-content">
    <aside class="sidebar">
        <div class="filter-section">
            <h3>Фильтры</h3>
            <div class="filter-group">
                <h4>Тип доступа</h4>
                <label><input type="checkbox" class="filter-privacy" value="PUBLIC"> Публичные</label>
                <label><input type="checkbox" class="filter-privacy" value="FRIENDS"> Для друзей</label>
                <label><input type="checkbox" class="filter-privacy" value="PRIVATE"> Приватные</label>
            </div>
            <div class="filter-group">
                <h4>Теги</h4>
                <div id="tagsCloud" class="tags-cloud">
                    <span>Загрузка...</span>
                </div>
                <input type="text" id="tagFilterInput" class="form-input" placeholder="Добавить тег">
            </div>
            <div class="filter-group">
                <h4>Дата</h4>
                <input type="date" id="filterDateFrom">
                <input type="date" id="filterDateTo">
            </div>
            <button class="btn-primary btn-full" id="applyFiltersBtn">Применить фильтры</button>
            <button class="btn-secondary btn-full" id="resetFiltersBtn">Сбросить</button>
        </div>
    </aside>

    <section class="feed">
        <div class="feed-header">
            <h2>Лента фотографий</h2>
            <div class="view-toggle">
                <button class="active" data-view="grid">
                    <span class="view-icon"><!-- SVG grid --></span>
                </button>
                <button data-view="list">
                    <span class="view-icon"><!-- SVG list --></span>
                </button>
            </div>
        </div>
        <div class="photo-grid" id="photoGrid">
            <p>Загрузка фотографий...</p>
        </div>
        <div class="load-more" id="loadMoreContainer">
            <button id="loadMoreBtn">Загрузить еще</button>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Фотоальбом — храните воспоминания</p>
    </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
